<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories - Bookstore</title>
    <!-- Bootstrap CSS -->
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .header-actions {
            margin-bottom: 20px;
        }
        .actions-cell {
            text-align: center;
        }
        .no-categories {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📂 Categories</h1>
        
        <div class="header-actions">
            <a href="/addcategory" class="btn btn-success">+ Add New Category</a>
        </div>
        
        <div th:if="${categories.isEmpty()}" class="no-categories">
            <p>No categories available at the moment.</p>
        </div>
        
        <table th:unless="${categories.isEmpty()}" class="table table-striped">
            <thead class="table-success">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.categoryid}"></td>
                    <td th:text="${category.name}"></td>
                    <td class="actions-cell">
                        <a th:href="@{/editcategory/{id}(id=${category.categoryid})}" class="btn btn-primary btn-sm me-1">Edit</a>
                        <form th:action="@{/deletecategory/{id}(id=${category.categoryid})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this category?');">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <br/>
        <p><a href="/">← Back to Home</a></p>
    </div>
</body>
</html>
