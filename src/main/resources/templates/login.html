<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form th:action="@{/login}" method="post">

    <div>
        Username:
        <input type="text" name="username"/>
    </div>

    <div>
        Password:
        <input type="password" name="password"/>
    </div>

    <div>
        <input type="submit" value="Sign In"/>
    </div>

</form>

</body>
</html>
